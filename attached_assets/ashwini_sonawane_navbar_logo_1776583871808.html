
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400&display=swap');

  .logo-showcase {
    display: flex;
    flex-direction: column;
    gap: 32px;
    padding: 2rem 0;
  }

  .navbar-preview {
    background: #0a0a0f;
    border-radius: 12px;
    padding: 0 28px;
    display: flex;
    align-items: center;
    height: 64px;
    border: 0.5px solid #2a2a3a;
    position: relative;
    overflow: hidden;
  }

  .navbar-preview::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 10% 50%, rgba(120, 80, 220, 0.08) 0%, transparent 60%);
    pointer-events: none;
  }

  .nav-links {
    margin-left: auto;
    display: flex;
    gap: 28px;
  }

  .nav-link {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    color: #888;
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .logo-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    text-decoration: none;
  }

  .monogram-ring {
    position: relative;
    width: 40px;
    height: 40px;
    flex-shrink: 0;
  }

  .monogram-svg {
    width: 40px;
    height: 40px;
    animation: rotateRing 8s linear infinite;
  }

  @keyframes rotateRing {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  .monogram-core {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .monogram-letter {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: #c9a96e;
    line-height: 1;
    animation: pulseGold 3s ease-in-out infinite;
  }

  @keyframes pulseGold {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  .name-block {
    display: flex;
    flex-direction: column;
    gap: 0px;
    line-height: 1;
  }

  .first-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    color: #f0ece3;
    letter-spacing: 0.02em;
    line-height: 1.15;
  }

  .last-name {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 300;
    color: #c9a96e;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    line-height: 1.3;
  }

  /* Standalone big logo */
  .logo-standalone {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    padding: 2.5rem;
    background: #0a0a0f;
    border-radius: 16px;
    border: 0.5px solid #2a2a3a;
    position: relative;
    overflow: hidden;
  }

  .logo-standalone::after {
    content: '';
    position: absolute;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(201, 169, 110, 0.07) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }

  .big-monogram {
    position: relative;
    width: 96px;
    height: 96px;
  }

  .big-monogram-svg {
    width: 96px;
    height: 96px;
    animation: rotateRing 10s linear infinite;
  }

  .big-monogram-core {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .big-letter {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: #c9a96e;
    line-height: 1;
    animation: pulseGold 3s ease-in-out infinite;
  }

  .big-first {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #f0ece3;
    letter-spacing: 0.04em;
    margin: 0;
    line-height: 1.1;
  }

  .big-last {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 300;
    color: #c9a96e;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin: 0;
  }

  .divider-line {
    width: 60px;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, #c9a96e, transparent);
  }

  .label {
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: #555;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 400;
  }

  .section {
    display: flex;
    flex-direction: column;
  }

  /* Light variant */
  .logo-light {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 2rem;
    background: #faf9f6;
    border-radius: 16px;
    border: 0.5px solid #e8e2d5;
  }

  .big-first-light {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: #1a1410;
    letter-spacing: 0.04em;
    margin: 0;
    line-height: 1.1;
  }

  .big-last-light {
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: #8b6914;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin: 0;
  }

  .divider-line-light {
    width: 50px;
    height: 0.5px;
    background: linear-gradient(90deg, transparent, #c9a96e, transparent);
  }
</style>

<div class="logo-showcase">

  <div class="section">
    <p class="label">Navbar preview — dark</p>
    <div class="navbar-preview">
      <a class="logo-wrap" href="#">
        <div class="monogram-ring">
          <svg class="monogram-svg" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.4" stroke-dasharray="2 4"/>
            <circle cx="20" cy="20" r="18" stroke="#c9a96e" stroke-width="1.5" stroke-opacity="0.9"
              stroke-dasharray="12 44" stroke-dashoffset="0" stroke-linecap="round"/>
          </svg>
          <div class="monogram-core">
            <span class="monogram-letter">AS</span>
          </div>
        </div>
        <div class="name-block">
          <span class="first-name">Ashwini</span>
          <span class="last-name">Sonawane</span>
        </div>
      </a>
      <div class="nav-links">
        <span class="nav-link">Work</span>
        <span class="nav-link">About</span>
        <span class="nav-link">Contact</span>
      </div>
    </div>
  </div>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">

    <div class="section">
      <p class="label">Dark — standalone</p>
      <div class="logo-standalone">
        <div class="big-monogram">
          <svg class="big-monogram-svg" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="48" cy="48" r="44" stroke="#c9a96e" stroke-width="0.8" stroke-opacity="0.25" stroke-dasharray="3 6"/>
            <circle cx="48" cy="48" r="44" stroke="#c9a96e" stroke-width="1.5" stroke-opacity="1"
              stroke-dasharray="28 106" stroke-dashoffset="0" stroke-linecap="round"/>
            <circle cx="48" cy="48" r="36" stroke="#c9a96e" stroke-width="0.5" stroke-opacity="0.2"/>
          </svg>
          <div class="big-monogram-core">
            <span class="big-letter">AS</span>
          </div>
        </div>
        <p class="big-first">Ashwini</p>
        <div class="divider-line"></div>
        <p class="big-last">Sonawane</p>
      </div>
    </div>

    <div class="section">
      <p class="label">Light — standalone</p>
      <div class="logo-light">
        <div class="big-monogram" style="width:80px;height:80px;">
          <svg style="width:80px;height:80px;animation:rotateRing 10s linear infinite;" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="48" cy="48" r="44" stroke="#b8941a" stroke-width="0.8" stroke-opacity="0.3" stroke-dasharray="3 6"/>
            <circle cx="48" cy="48" r="44" stroke="#b8941a" stroke-width="1.5" stroke-opacity="1"
              stroke-dasharray="28 106" stroke-dashoffset="0" stroke-linecap="round"/>
            <circle cx="48" cy="48" r="36" stroke="#b8941a" stroke-width="0.5" stroke-opacity="0.2"/>
          </svg>
          <div class="big-monogram-core">
            <span class="big-letter" style="color:#8b6914;font-size:28px;">AS</span>
          </div>
        </div>
        <p class="big-first-light">Ashwini</p>
        <div class="divider-line-light"></div>
        <p class="big-last-light">Sonawane</p>
      </div>
    </div>

  </div>

</div>
